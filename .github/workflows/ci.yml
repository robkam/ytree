name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc

    - name: Compile (Release)
      run: make

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Tests
      env:
        TERM: xterm
      # 1. Run pytest and save output to a file (allowing failure with "|| true")
      # 2. Extract failure lines to the GitHub Summary page for instant viewing
      # 3. Exit with 1 if failures were found to mark the CI as failed
      run: |
        pytest -q -ra --tb=no > test_results.txt 2>&1 || true
        echo "### Test Failures" >> $GITHUB_STEP_SUMMARY
        echo '```text' >> $GITHUB_STEP_SUMMARY
        grep "FAILED tests/" test_results.txt >> $GITHUB_STEP_SUMMARY || echo "No test failures detected." >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        if grep -q "FAILED tests/" test_results.txt; then
          exit 1
        fi