name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc

    - name: Compile (Release)
      run: make

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Tests
      env:
        TERM: xterm
      # Assuming pytest is configured to find tests in tests/
      run: pytest
