name: C/C++ Baseline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Baseline local-equivalent gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc lcov

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Guard fuzz harness sync
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BASE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        set -eu
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_SHA="$PR_BASE_SHA"
          HEAD_SHA="$PR_HEAD_SHA"
        else
          BASE_SHA="$PUSH_BASE_SHA"
          HEAD_SHA="$PUSH_HEAD_SHA"
        fi
        python3 scripts/check_fuzz_harness_sync.py --base "$BASE_SHA" --head "$HEAD_SHA"

    - name: Run baseline gate (local-equivalent, includes qa-fileops-integrity)
      run: make ci-baseline

    - name: Publish coverage summary
      if: always() && hashFiles('coverage/summary.txt') != ''
      run: |
        echo "### C Coverage (gcov + lcov)" >> "$GITHUB_STEP_SUMMARY"
        echo '```text' >> "$GITHUB_STEP_SUMMARY"
        cat coverage/summary.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload lcov report artifact
      if: always() && hashFiles('coverage/lcov.info') != ''
      uses: actions/upload-artifact@v7
      with:
        name: lcov-info
        path: coverage/lcov.info

    - name: Upload fuzz artifacts
      if: always() && hashFiles('build/fuzz/artifacts/*') != ''
      uses: actions/upload-artifact@v7
      with:
        name: fuzz-artifacts
        path: build/fuzz/artifacts/
