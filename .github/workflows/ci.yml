name: C/C++ Baseline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  changes:
    name: Detect QA-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      qa_relevant: ${{ steps.force.outputs.qa_relevant || steps.filter.outputs.qa_relevant }}
    steps:
    - name: Force QA on main pushes
      id: force
      if: github.event_name == 'push'
      run: echo "qa_relevant=true" >> "$GITHUB_OUTPUT"

    - name: Detect PR file changes
      id: filter
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v4
      with:
        filters: |
          qa_relevant:
            - 'src/**'
            - 'include/**'
            - 'tests/**'
            - 'scripts/**'
            - 'Makefile'
            - '.github/workflows/**'

  guard-fuzz-sync:
    name: Guard fuzz harness sync
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.qa_relevant == 'true'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: scripts/requirements.txt

    - name: Guard fuzz harness sync
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BASE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        set -eu
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_SHA="$PR_BASE_SHA"
          HEAD_SHA="$PR_HEAD_SHA"
        else
          BASE_SHA="$PUSH_BASE_SHA"
          HEAD_SHA="$PUSH_HEAD_SHA"
        fi
        python3 scripts/check_fuzz_harness_sync.py --base "$BASE_SHA" --head "$HEAD_SHA"

  qa-fileops-integrity:
    name: File mutation integrity gate
    runs-on: ubuntu-latest
    needs: [changes, guard-fuzz-sync]
    if: github.event_name == 'push' || needs.changes.outputs.qa_relevant == 'true'
    env:
      CC: ccache cc
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.workflow }}-baseline-${{ hashFiles('Makefile', '.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.workflow }}-baseline-
          ${{ runner.os }}-ccache-${{ github.workflow }}-

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: scripts/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Configure compiler cache
      run: |
        ccache --set-config=max_size=700M
        ccache --set-config=sloppiness=time_macros
        ccache --zero-stats

    - name: Run unsafe API, relay policy config, and file mutation gate
      run: |
        make qa-unsafe-apis
        make qa-ai-config
        make qa-fileops-integrity

    - name: Report ccache stats
      if: always()
      run: ccache --show-stats

  qa-pytest-coverage:
    name: Full coverage baseline gate
    runs-on: ubuntu-latest
    needs: [changes, guard-fuzz-sync]
    if: github.event_name == 'push' || needs.changes.outputs.qa_relevant == 'true'
    env:
      CC: ccache cc
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache clang llvm libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc lcov

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.workflow }}-coverage-${{ hashFiles('Makefile', '.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.workflow }}-coverage-
          ${{ runner.os }}-ccache-${{ github.workflow }}-

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: scripts/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Configure compiler cache
      run: |
        ccache --set-config=max_size=700M
        ccache --set-config=sloppiness=time_macros
        ccache --zero-stats

    - name: Run coverage baseline gate
      run: make qa-pytest-coverage

    - name: Publish coverage summary
      if: always() && hashFiles('coverage/summary.txt') != ''
      run: |
        echo "### C Coverage (gcov + lcov)" >> "$GITHUB_STEP_SUMMARY"
        echo '```text' >> "$GITHUB_STEP_SUMMARY"
        cat coverage/summary.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload lcov report artifact
      if: always() && hashFiles('coverage/lcov.info') != ''
      uses: actions/upload-artifact@v7
      with:
        name: lcov-info
        path: coverage/lcov.info

    - name: Report ccache stats
      if: always()
      run: ccache --show-stats

  qa-fuzz:
    name: Fuzz baseline gate
    runs-on: ubuntu-latest
    needs: [changes, guard-fuzz-sync]
    if: github.event_name == 'push' || needs.changes.outputs.qa_relevant == 'true'
    env:
      FUZZ_CC: ccache clang
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache clang

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.workflow }}-fuzz-${{ hashFiles('Makefile', '.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.workflow }}-fuzz-
          ${{ runner.os }}-ccache-${{ github.workflow }}-

    - name: Configure compiler cache
      run: |
        ccache --set-config=max_size=700M
        ccache --set-config=sloppiness=time_macros
        ccache --zero-stats

    - name: Run fuzz baseline gate
      run: make qa-fuzz FUZZ_CC="$FUZZ_CC"

    - name: Report ccache stats
      if: always()
      run: ccache --show-stats

    - name: Upload fuzz artifacts
      if: always() && hashFiles('build/fuzz/artifacts/*') != ''
      uses: actions/upload-artifact@v7
      with:
        name: fuzz-artifacts
        path: build/fuzz/artifacts/
