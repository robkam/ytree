name: Update uthash

on:
  schedule:
    # Run once a month (on the 1st day at 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-lib:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download latest uthash.h
        run: |
          # Download directly from the official master branch
          curl -o include/uthash.h https://raw.githubusercontent.com/troydhanson/uthash/master/src/uthash.h

      - name: Check for changes
        id: verify_diff
        run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.verify_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update uthash.h to latest upstream"
          title: "chore(deps): Update uthash.h"
          body: |
            This PR updates `include/uthash.h` to the latest version from the official repository.

            **Source:** [troydhanson/uthash](https://github.com/troydhanson/uthash)

            *Auto-generated by GitHub Actions.*
          branch: update-uthash-dep
          base: main
          delete-branch: true