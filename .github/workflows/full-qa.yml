name: C/C++ Full QA

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-qa-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect full-QA relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      qa_relevant: ${{ steps.force.outputs.qa_relevant || steps.filter.outputs.qa_relevant }}
    steps:
    - name: Force full QA for manual dispatch
      id: force
      if: github.event_name == 'workflow_dispatch'
      run: echo "qa_relevant=true" >> "$GITHUB_OUTPUT"

    - name: Detect PR file changes
      id: filter
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v4
      with:
        filters: |
          qa_relevant:
            - 'src/**'
            - 'include/**'
            - 'tests/**'
            - 'scripts/**'
            - 'Makefile'
            - '.github/workflows/**'

  qa-all:
    name: Full local-equivalent QA gate (qa-all)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.qa_relevant == 'true'
    timeout-minutes: 90
    env:
      CC: ccache cc
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache gitleaks libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc clang-tidy cppcheck clang-tools bear valgrind

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.workflow }}-qa-all-${{ hashFiles('Makefile', '.github/workflows/full-qa.yml') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.workflow }}-qa-all-
          ${{ runner.os }}-ccache-${{ github.workflow }}-

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: scripts/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Configure compiler cache
      run: |
        ccache --set-config=max_size=900M
        ccache --set-config=sloppiness=time_macros
        ccache --zero-stats

    - name: Guard fuzz harness sync
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BASE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        set -eu
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_SHA="$PR_BASE_SHA"
          HEAD_SHA="$PR_HEAD_SHA"
        else
          BASE_SHA="$PUSH_BASE_SHA"
          HEAD_SHA="$PUSH_HEAD_SHA"
        fi
        python3 scripts/check_fuzz_harness_sync.py --base "$BASE_SHA" --head "$HEAD_SHA"

    - name: Run full QA gate
      run: make qa-all-log QA_LOG=qa-all.log

    - name: Upload qa-all log artifact
      if: always() && hashFiles('qa-all.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-all-log
        path: qa-all.log

    - name: Upload valgrind log artifact
      if: always() && hashFiles('valgrind.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-all-valgrind-log
        path: valgrind.log

    - name: Report ccache stats
      if: always()
      run: ccache --show-stats

  qa-sanitize:
    name: Sanitizer gate (qa-sanitize)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.qa_relevant == 'true'
    timeout-minutes: 120
    env:
      CC: ccache cc
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc clang

    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-ccache-${{ github.workflow }}-qa-sanitize-${{ hashFiles('Makefile', '.github/workflows/full-qa.yml') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.workflow }}-qa-sanitize-
          ${{ runner.os }}-ccache-${{ github.workflow }}-

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: scripts/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Configure compiler cache
      run: |
        ccache --set-config=max_size=900M
        ccache --set-config=sloppiness=time_macros
        ccache --zero-stats

    - name: Run sanitizer QA gate
      run: make qa-sanitize 2>&1 | tee qa-sanitize.log

    - name: Upload qa-sanitize log artifact
      if: always() && hashFiles('qa-sanitize.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-sanitize-log
        path: qa-sanitize.log

    - name: Report ccache stats
      if: always()
      run: ccache --show-stats
