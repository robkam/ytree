name: C/C++ Full QA

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: full-qa-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  qa-all:
    name: Full local-equivalent QA gate (qa-all)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc clang-tidy cppcheck clang-tools bear valgrind

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Guard fuzz harness sync
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BASE_SHA: ${{ github.event.before }}
        PUSH_HEAD_SHA: ${{ github.sha }}
      run: |
        set -eu
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_SHA="$PR_BASE_SHA"
          HEAD_SHA="$PR_HEAD_SHA"
        else
          BASE_SHA="$PUSH_BASE_SHA"
          HEAD_SHA="$PUSH_HEAD_SHA"
        fi
        python3 scripts/check_fuzz_harness_sync.py --base "$BASE_SHA" --head "$HEAD_SHA"

    - name: Run full QA gate
      run: make qa-all-log QA_LOG=qa-all.log

    - name: Upload qa-all log artifact
      if: always() && hashFiles('qa-all.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-all-log
        path: qa-all.log

    - name: Upload valgrind log artifact
      if: always() && hashFiles('valgrind.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-all-valgrind-log
        path: valgrind.log

  qa-sanitize:
    name: Sanitizer gate (qa-sanitize)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses-dev libtinfo-dev libreadline-dev libarchive-dev libarchive-tools pandoc clang

    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run sanitizer QA gate
      run: make qa-sanitize 2>&1 | tee qa-sanitize.log

    - name: Upload qa-sanitize log artifact
      if: always() && hashFiles('qa-sanitize.log') != ''
      uses: actions/upload-artifact@v7
      with:
        name: qa-sanitize-log
        path: qa-sanitize.log
