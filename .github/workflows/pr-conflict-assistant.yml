name: PR Freshness Gate

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  up-to-date-with-main:
    name: Up To Date With Main
    runs-on: ubuntu-latest
    steps:
      - name: Check PR head contains latest main
        uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- pr-freshness-gate-comment -->";
            const pr = context.payload.pull_request;
            const issue_number = pr.number;
            const { owner, repo } = context.repo;

            const baseSha = pr.base.sha;
            const headSha = pr.head.sha;
            const baseRef = pr.base.ref;

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${baseSha}...${headSha}`,
            });

            const status = compare.data.status;
            const upToDate = status === "ahead" || status === "identical";

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existingComment = comments.find(
              (c) => c.user && c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            const fromFork = pr.head.repo.full_name !== `${owner}/${repo}`;
            const syncHint = fromFork
              ? `Sync your branch with upstream \`${baseRef}\`, then push again.`
              : `Rebase or merge the latest \`${baseRef}\` into this branch, then push again.`;

            if (!upToDate) {
              const body = [
                marker,
                "### Branch Not Up To Date",
                "",
                `This PR branch is **${status}** relative to the latest \`${baseRef}\`.`,
                `Behind by: **${compare.data.behind_by}** commit(s).`,
                "",
                syncHint,
              ].join("\n");

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }

              core.setFailed(
                `PR branch must be updated to latest ${baseRef} before merge (status: ${status}).`
              );
              return;
            }

            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existingComment.id,
              });
            }
