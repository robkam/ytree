name: PR Conflict Assistant

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  conflict-check:
    name: PR Conflict Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Dry-run merge from base
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "${BASE_REF}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git merge --no-commit --no-ff "origin/${BASE_REF}" >/tmp/merge_stdout.txt 2>/tmp/merge_stderr.txt; then
            echo "has_conflicts=no" >> "$GITHUB_OUTPUT"
            echo "0" > /tmp/conflict_count.txt
            : > /tmp/conflict_files.txt
          else
            git diff --name-only --diff-filter=U > /tmp/conflict_files.txt || true
            CONFLICT_COUNT=$(wc -l < /tmp/conflict_files.txt | tr -d ' ')
            echo "has_conflicts=yes" >> "$GITHUB_OUTPUT"
            echo "${CONFLICT_COUNT}" > /tmp/conflict_count.txt
          fi

          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git merge --abort || true
          fi

      - name: Build conflict report
        shell: bash
        run: |
          set -euo pipefail
          HAS_CONFLICTS="${{ steps.detect.outputs.has_conflicts }}"
          CONFLICT_COUNT=$(cat /tmp/conflict_count.txt)

          {
            echo "<!-- pr-conflict-assistant-comment -->"
            echo "### PR Conflict Assistant"
            echo
            if [ "${HAS_CONFLICTS}" = "yes" ]; then
              echo "- Merge status: **conflicts detected**"
              echo "- Conflicting files: **${CONFLICT_COUNT}**"
              echo
              echo "#### Conflicting Files"
              echo '```text'
              cat /tmp/conflict_files.txt
              echo '```'
              echo
              echo "#### Required Next Step"
              echo "Resolve conflicts on the PR branch, push, and wait for this check to rerun clean."
            else
              echo "- Merge status: **no textual conflicts detected**"
              echo "- Conflicting files: **0**"
              echo
              echo "Base branch merged cleanly in dry-run mode at this PR revision."
            fi
            echo
            echo "_Generated by `.github/workflows/pr-conflict-assistant.yml`_"
          } > /tmp/pr_conflict_comment.md

      - name: Publish sticky PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-conflict-assistant-comment -->";
            const body = fs.readFileSync("/tmp/pr_conflict_comment.md", "utf8");
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(
              (c) => c.body && c.body.includes(marker) && c.user && c.user.type === "Bot"
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
