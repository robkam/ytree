name: PR Size Gate

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  size-signal:
    name: PR Size Label And Warning
    runs-on: ubuntu-latest
    steps:
      - name: Label PR size and post warning for large changes
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- pr-size-warning-comment -->";
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const changedLines = (pr.additions || 0) + (pr.deletions || 0);
            let size = "S";
            if (changedLines > 1000) {
              size = "XL";
            } else if (changedLines > 400) {
              size = "L";
            } else if (changedLines > 200) {
              size = "M";
            }

            const labelName = `size/${size}`;
            const labelDefs = [
              { name: "size/S", color: "0e8a16", description: "PR changed lines <= 200" },
              { name: "size/M", color: "fbca04", description: "PR changed lines 201-400" },
              { name: "size/L", color: "d93f0b", description: "PR changed lines 401-1000" },
              { name: "size/XL", color: "b60205", description: "PR changed lines > 1000" },
            ];

            for (const label of labelDefs) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }
            }

            const existingLabels = (pr.labels || []).map((l) => l.name);
            for (const existing of existingLabels) {
              if (existing.startsWith("size/") && existing !== labelName) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: existing,
                  });
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
            }

            if (!existingLabels.includes(labelName)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [labelName],
              });
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existingComment = comments.find(
              (c) => c.user && c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (size === "L" || size === "XL") {
              const body = [
                marker,
                "### Large PR Warning",
                "",
                `This PR is labeled **${labelName}** (${changedLines} changed lines).`,
                "",
                "Please fill the **For large PRs only** section in the PR template:",
                "- Why this PR is large",
                "- Why it is not split right now (and links to related PRs, if any)",
                "- What could break",
              ].join("\n");

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } else if (existingComment) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existingComment.id,
              });
            }
