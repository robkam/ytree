name: PR Size Gate

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  size-signal:
    name: PR Size Label
    runs-on: ubuntu-latest
    steps:
      - name: Label PR size
        uses: actions/github-script@v9
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const changedLines = (pr.additions || 0) + (pr.deletions || 0);
            let size = "S";
            if (changedLines > 1000) {
              size = "XL";
            } else if (changedLines > 400) {
              size = "L";
            } else if (changedLines > 200) {
              size = "M";
            }

            const labelName = `size/${size}`;
            const labelDefs = [
              { name: "size/S", color: "0e8a16", description: "PR changed lines <= 200" },
              { name: "size/M", color: "fbca04", description: "PR changed lines 201-400" },
              { name: "size/L", color: "d93f0b", description: "PR changed lines 401-1000" },
              { name: "size/XL", color: "b60205", description: "PR changed lines > 1000" },
            ];

            for (const label of labelDefs) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (error) {
                if (error.status !== 422 && error.status !== 403) {
                  throw error;
                }
                if (error.status === 403) {
                  core.warning(`Skipping label creation (${label.name}): ${error.message}`);
                }
              }
            }

            const existingLabels = (pr.labels || []).map((l) => l.name);
            for (const existing of existingLabels) {
              if (existing.startsWith("size/") && existing !== labelName) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: existing,
                  });
                } catch (error) {
                  if (error.status !== 404 && error.status !== 403) {
                    throw error;
                  }
                  if (error.status === 403) {
                    core.warning(`Skipping size label removal (${existing}): ${error.message}`);
                  }
                }
              }
            }

            if (!existingLabels.includes(labelName)) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [labelName],
                });
              } catch (error) {
                if (error.status !== 403) {
                  throw error;
                }
                core.warning(`Skipping size label add (${labelName}): ${error.message}`);
              }
            }
