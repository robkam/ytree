name: PR Risk Gate

on:
  pull_request:
    branches: ["main"]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  risk-summary:
    name: PR Risk Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build risk summary
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/pr_files.txt
          git diff --numstat "$BASE_SHA" "$HEAD_SHA" > /tmp/pr_numstat.txt

          FILE_COUNT=$(wc -l < /tmp/pr_files.txt | tr -d ' ')
          INSERTIONS=$(awk '{a+=$1} END {print a+0}' /tmp/pr_numstat.txt)
          DELETIONS=$(awk '{d+=$2} END {print d+0}' /tmp/pr_numstat.txt)
          TOTAL_LINES=$((INSERTIONS + DELETIONS))

          HAS_WORKFLOW_CHANGE=no
          HAS_CORE_CHANGE=no
          HAS_TEST_CHANGE=no
          HAS_BUILD_CHANGE=no
          DOC_ONLY=no

          if [ "$FILE_COUNT" -gt 0 ] && grep -q '^\.github/workflows/' /tmp/pr_files.txt; then
            HAS_WORKFLOW_CHANGE=yes
          fi
          if [ "$FILE_COUNT" -gt 0 ] && grep -Eq '^(src/|include/)' /tmp/pr_files.txt; then
            HAS_CORE_CHANGE=yes
          fi
          if [ "$FILE_COUNT" -gt 0 ] && grep -Eq '^(tests/|doc/|etc/)' /tmp/pr_files.txt; then
            HAS_TEST_CHANGE=yes
          fi
          if [ "$FILE_COUNT" -gt 0 ] && grep -Eq '^(Makefile|scripts/|\.githooks/)' /tmp/pr_files.txt; then
            HAS_BUILD_CHANGE=yes
          fi
          if [ "$FILE_COUNT" -gt 0 ] && grep -Eqv '^(doc/|README\.md|LICENSE\.md|\.github/pull_request_template\.md)' /tmp/pr_files.txt; then
            DOC_ONLY=no
          else
            DOC_ONLY=yes
          fi

          SCORE=0
          REASONS=""

          if [ "$HAS_WORKFLOW_CHANGE" = "yes" ]; then
            SCORE=$((SCORE + 3))
            REASONS="${REASONS}\n- Workflow changes can alter release and security gates."
          fi
          if [ "$HAS_BUILD_CHANGE" = "yes" ]; then
            SCORE=$((SCORE + 2))
            REASONS="${REASONS}\n- Build/hook/script changes can change enforcement behavior."
          fi
          if [ "$HAS_CORE_CHANGE" = "yes" ] && [ "$HAS_TEST_CHANGE" = "no" ]; then
            SCORE=$((SCORE + 2))
            REASONS="${REASONS}\n- Core code changed without visible test/doc/etc evidence."
          fi
          if [ "$TOTAL_LINES" -gt 1000 ] || [ "$FILE_COUNT" -gt 30 ]; then
            SCORE=$((SCORE + 1))
            REASONS="${REASONS}\n- Large change set increases regression risk."
          fi

          RISK_LEVEL="low"
          if [ "$SCORE" -ge 5 ]; then
            RISK_LEVEL="high"
          elif [ "$SCORE" -ge 2 ]; then
            RISK_LEVEL="medium"
          fi

          if [ -z "$REASONS" ]; then
            REASONS="\n- No high-signal structural risk flags detected by automation."
          fi

          {
            echo "<!-- pr-risk-gate-comment -->"
            echo "### PR Risk Gate Summary"
            echo
            echo "- Risk level: **${RISK_LEVEL}**"
            echo "- Files changed: **${FILE_COUNT}**"
            echo "- Line delta: **+${INSERTIONS} / -${DELETIONS}**"
            echo "- Core code touched: **${HAS_CORE_CHANGE}**"
            echo "- Workflow touched: **${HAS_WORKFLOW_CHANGE}**"
            echo "- Docs-only change: **${DOC_ONLY}**"
            echo
            echo "#### Automated Risk Signals"
            printf "%b\n" "$REASONS"
            echo
            echo "#### Changed Files (first 60)"
            echo '```text'
            head -n 60 /tmp/pr_files.txt
            echo '```'
            echo
            echo "_Generated by `.github/workflows/pr-gate.yml`_"
          } > /tmp/pr_risk_comment.md

      - name: Publish sticky PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-risk-gate-comment -->";
            const body = fs.readFileSync("/tmp/pr_risk_comment.md", "utf8");
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(
              (c) => c.body && c.body.includes(marker) && c.user && c.user.type === "Bot"
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
