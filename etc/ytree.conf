###############################################
# Ytree Defaults
# Modify this file and copy it to the hidden
# file called .ytree placed in your home directory.
# You may also invoke it explicitly with the
# "-p <profile-filename> command line argument.
###############################################

[GLOBAL]
# AUTO_REFRESH: Add values to combine modes.
# 1 Enable File System Watcher.
# 2 Refresh on Directory Navigation selection.
# 4 Refresh when entering the File Window.
AUTO_REFRESH=1
TREEDEPTH=2
FILEMODE=2
NUMBERSEP=.
NOSMALLWINDOW=1
AUDIBLEERROR=1
CONFIRMQUIT=0

# HIGHLIGHT_FULL_LINE: Set to 1 to highlight the entire line for the selected
# entry. Set to 0 for the classic behavior, which highlights only the filename.
HIGHLIGHT_FULL_LINE=0

# HIDEDOTFILES: Set to 1 to hide files and directories starting with a dot by
# default. Set to 0 to show them. This can be toggled with the ` key.
HIDEDOTFILES=1

# ANIMATION: Set to 1 to enable the warp-speed starfield animation
# during directory scanning. Set to 0 for the classic static logo.
ANIMATION=0

#LISTJUMP search: 0== standard (one key); 1==incremental
LISTJUMPSEARCH=0
# SEARCHCOMMAND=grep  {}

# Configure if the internal HEX-Viewer/Editor should display
# Adress-Offsets in hex (HEX) or decimal (DECIMAL)
HEXEDITOFFSET=HEX

# Make ytree start in file window mode, in a specified directory
# The "root" directory for ytree is specified on the command
# line; INITIALDIR must be a directory under this root directory.
# The form may be ".", "/full/path/userhome/test/alpha/beta",
# "./alpha/beta", "~/test/alpha/beta", or "beta"
# INITIALDIR=./alpha/beta

# You can create a custom view by defining the variable USERVIEW

# %tag: Tag-Symbol
# %fnm: Filename
# %atr: Attributes
# %lct: Link-Count
# %fsz: File-Size
# %mot: Modification Time
# %lnm: Symbolik Link-Name
# %uid: User-ID
# %gid: Group-ID
# %ino: Inode
# %act: Access Time
# %sct: Status Change Time

# USERVIEW=%tag%fnm %atr %lct %fsz %mot

# Uncomment the following lines to customize external helper programs.
# CAT=cat
EDITOR=vim
# HEXDUMP=builtin
# MANROFF=nroff -man
# MELT=melt
# PAGER=less -cen
# TAGGEDVIEWER controls `^V` (View Tagged) mode:
#   external = use PAGER (default, less-style behavior)
#   internal = use ytree internal tagged viewer (Space/n/p handling in ytree)
TAGGEDVIEWER=external

#############################
# Bracketed [] sections may appear in any order after the
# initial global configuration section.
#############################

#
# UI Color Customization
# Colors can be specified as:
# 1. Standard names: black, red, green, yellow, blue, magenta, cyan, white
# 2. Numeric codes (0-255) for 256-color terminals (e.g., TERM=xterm-256color)
#
[COLORS]
# Classic ytree color scheme (default)
# DIR_COLOR=white,blue
# HIDIR_COLOR=black,white
# WINDIR_COLOR=cyan,blue
# FILE_COLOR=white,blue
# HIFILE_COLOR=black,white
# WINFILE_COLOR=cyan,blue
# STATS_COLOR=blue,cyan
# WINSTATS_COLOR=blue,cyan
# BORDERS_COLOR=blue,cyan
# HIMENUS_COLOR=white,blue
# MENU_COLOR=cyan,blue
# WINERR_COLOR=blue,white
# HST_COLOR=yellow,cyan
# HIHST_COLOR=white,white
# WINHST_COLOR=yellow,cyan
# GLOBAL_COLOR=yellow,cyan
# HIGLOBAL_COLOR=white,yellow   # Search-hit highlight (preview/internal tagged view)
# INFO_COLOR=white,blue
# WARN_COLOR=yellow,black
# ERR_COLOR=red,white

# Example "Terminal Classic" (Bash-like 256-color Theme)
Dull white on black, bright white hotkeys, dull yellow highlights.
DIR_COLOR=7,0        # Dull White on Black
HIDIR_COLOR=0,3      # Black on Dull Yellow (Selection)
WINDIR_COLOR=7,0     # Window text/borders
FILE_COLOR=7,0
HIFILE_COLOR=0,3     # Black on Dull Yellow (Selection)
WINFILE_COLOR=7,0
STATS_COLOR=7,0
WINSTATS_COLOR=7,0
BORDERS_COLOR=8,0    # Bright Black (Gray) borders
MENU_COLOR=7,0       # Footer Menu Text
HIMENUS_COLOR=15,0   # Footer Key Bindings (Bright White)
WINERR_COLOR=15,1    # Bright White on Red
HST_COLOR=7,0        # Text background for F2 History
HIHST_COLOR=0,3
WINHST_COLOR=7,0     # Window background for F2 History
GLOBAL_COLOR=3,0
HIGLOBAL_COLOR=15,3
INFO_COLOR=15,4      # Bright White on Blue
WARN_COLOR=11,0      # Bright Yellow on Black
ERR_COLOR=15,1       # Bright White on Red

#
# File Type Colorization
# Rules are checked in order. Special keywords are DIR, LINK, EXEC.
# Wildcards are supported for filename patterns.
#
[FILE_COLORS]
# Standard Bash/LS colors on Black background
DIR=4,0       # Blue
LINK=6,0      # Cyan
EXEC=2,0      # Green

